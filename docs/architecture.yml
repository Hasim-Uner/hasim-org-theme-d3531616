version: 1
generated_context: manual architecture model
updated: "2026-06-02"

repository:
  type: wordpress_child_theme
  parent_theme: GeneratePress
  php_namespace_style: global_functions
  function_prefixes:
    - hp_
    - nexus_
  entrypoints:
    - functions.php
    - inc/bootstrap.php
    - inc/manifest.php

bootstrap:
  flow:
    - wordpress_loads: functions.php
    - functions_php_requires: inc/bootstrap.php
    - bootstrap_reads_manifest: inc/manifest.php
    - bootstrap_validates_each_module: true
    - bootstrap_requires_each_module_in_order: true
  manifest: inc/manifest.php

entity_ids:
  person: "/#person"
  organization: "/#organization"
  website: "/#website"
  essay: "{permalink}#article"
  note: "{permalink}#article"
  glossar: "{permalink}#term"
  dossier: "{permalink}#dossier"
  topic: "{term_link}#topic"

modules:
  bootstrap:
    purpose: Theme entry and module loading.
    files:
      - functions.php
      - inc/bootstrap.php
      - inc/manifest.php
    hooks: []
    routes: []
    assets: []
    dependencies:
      - WordPress theme loader
    owns:
      - module load order
      - include validation

  core_helpers:
    purpose: Shared helpers for reading time, body classes, search query extension and rewrite flush.
    files:
      - inc/helpers.php
    hooks:
      - body_class: hp_custom_body_classes
      - pre_get_posts: hp_extend_search_to_cpts
      - after_switch_theme: hp_flush_rewrite_rules
    routes: []
    assets: []
    dependencies:
      - post_types
    owns:
      - reading time output
      - search post type inclusion
      - common body classes

  feature_flags:
    purpose: Runtime feature flags via defaults, constants and filters.
    files:
      - inc/feature-flags.php
    hooks:
      - filter: hp_feature_flags
      - filter: hp_feature_flag_{flag}
    routes: []
    assets: []
    dependencies: []
    owns:
      - feature rollout decisions
      - llms.txt flag
      - sitemap user-provider flag

  runtime_assets:
    purpose: Asset cache-busting and deferred script helper.
    files:
      - inc/runtime-assets.php
    hooks: []
    routes: []
    assets: []
    dependencies:
      - WordPress asset APIs
    owns:
      - hp_asset_version
      - hp_enqueue_deferred_script

  post_types:
    purpose: Essay and note custom post types.
    files:
