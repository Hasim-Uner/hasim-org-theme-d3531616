systems:
  structured_data:
    primary_files:
      - inc/seo-schema.php
      - inc/seo/schema-helpers.php
      - inc/seo/schema-site.php
      - inc/seo/schema-content.php
      - inc/seo/schema-archives.php
      - inc/breadcrumbs.php
      - inc/seo-meta.php
    check_after_change:
      - validate JSON-LD output
      - verify canonical and @id consistency

  knowledge_graph:
    primary_files:
      - inc/graph-api.php
      - inc/mini-graph.php
      - inc/glossary.php
      - inc/dossier.php
      - inc/taxonomies.php
    check_after_change:
      - graph payload shape
      - cache status behavior
      - no synchronous rebuild in render path

  crawl_indexing:
    primary_files:
      - inc/seo-hygiene.php
      - inc/sitemap.php
      - robots.txt
    check_after_change:
      - noindex rules
      - sitemap inclusion
      - redirect behavior

  frontend_assets:
    primary_files:
      - inc/enqueue.php
      - inc/runtime-assets.php
      - docs/ASSET_MATRIX.md
      - assets/css
      - assets/js
    check_after_change:
      - load condition
      - asset existence
      - versioning

  personal_data:
    primary_files:
      - inc/contact.php
      - inc/forms/contact
      - inc/contacts-admin.php
      - inc/forms/newsletter
      - inc/privacy-maintenance.php
    check_after_change:
      - nonce and rate limits
      - retention behavior
      - no secret exposure
