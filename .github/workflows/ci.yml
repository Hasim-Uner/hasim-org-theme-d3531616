name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [ '8.1', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
      - name: Lint all PHP files
        run: |
          set -e
          find . -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l

  architecture:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Validate module manifest
        run: php scripts/check-manifest.php

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    # Advisory gate: läuft mit WordPress-Stubs, blockiert aber zunächst
    # nicht den Merge. Sobald die Baseline sauber ist, kann
    # continue-on-error entfernt werden, um PHPStan zum harten Gate zu machen.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Validate composer.json
        run: composer validate --no-check-publish
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPStan
        run: composer run analyse
